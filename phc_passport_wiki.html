<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Паспорти індикаторів</title>
<style>
  :root{
    --N0:#ffffff; --N10:#f7f8f9; --N20:#f1f2f4; --N30:#dcdfe4;
    --N40:#b3b9c4; --N300:#8590a2; --N500:#626f86; --N700:#44546f;
    --N800:#2c3e5d; --N900:#172b4d;
    --blue:#3a6ea5; --blue-bg:#eef2f7; --blue-border:#d6e0eb;
    --green:#4a7059; --green-bg:#eaf1ec; --green-border:#d3e2d8;
    --yellow:#8a6f3d; --yellow-bg:#f5f0e1; --yellow-border:#e6dcbf;
    --catchup:#8a6a45; --catchup-bg:#f3eee7; --dist:#4a7488; --dist-bg:#e9eef1;
    --red:#9a5852; --red-bg:#f3eae9;
    --link:#3a6ea5; --code-bg:#f1f2f4; --sidebar:#f7f8f9; --line:#dcdfe4;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ font:14px/1.714 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--N900); background:var(--N0); display:flex; -webkit-font-smoothing:antialiased; }
  aside{ width:320px; flex:none; height:100vh; overflow-y:auto; background:var(--sidebar);
    border-right:1px solid var(--line); padding:14px 0; }
  .space{ display:flex; align-items:center; justify-content:center; padding:18px 16px;
    border-bottom:1px solid var(--line); margin-bottom:8px; }
  .space img{ width:150px; max-width:100%; height:auto; display:block; }
  .search{ margin:0 12px 12px; }
  .search input{ width:100%; padding:6px 10px; border:1px solid var(--N30); border-radius:6px;
    font-size:13px; background:#fff; color:var(--N900); }
  .search input::placeholder{ color:var(--N300); }
  .search input:focus{ outline:none; border-color:var(--blue); box-shadow:0 0 0 1px var(--blue); }
  details.acc > summary{ list-style:none; cursor:pointer; display:flex; align-items:center; gap:4px; color:var(--N700); }
  details.acc > summary::-webkit-details-marker{ display:none; }
  details.acc > summary::before{ content:"\25B8"; color:var(--N40); font-size:10px; width:14px;
    text-align:center; transition:transform .12s; flex:none; }
  details.acc[open] > summary::before{ transform:rotate(90deg); }
  details.type > summary{ padding:6px 16px 6px 12px; font-size:13px; font-weight:600; }
  details.type > summary:hover{ background:var(--N20); }
  details.hidden{ display:none; }
  nav button{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; border:0;
    background:none; font:inherit; font-size:13px; color:var(--N700); padding:5px 14px 5px 30px;
    cursor:pointer; border-left:2px solid transparent; }
  nav button:hover{ background:var(--N20); }
  nav .dot{ width:7px; height:7px; border-radius:50%; flex:none; }
  nav .dot.onsched{ background:var(--blue); }
  nav .dot.catchup{ background:var(--catchup); }
  nav .dot.dist{ background:var(--dist); }
  nav button.active{ background:var(--blue-bg); color:var(--blue); font-weight:600; border-left-color:var(--blue); }
  nav button.hidden{ display:none; }
  nav button.home{ padding:6px 16px 6px 12px; font-weight:600; color:var(--N700);
    display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .ov-group{ margin:26px 0; } .ov-group h3{ margin:0 0 12px; }
  .ov-cards{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:720px){ .ov-cards{ grid-template-columns:1fr; } }
  .ov-card{ border:1px solid var(--N30); border-radius:6px; padding:12px 14px; cursor:pointer;
    background:#fff; transition:border-color .12s, box-shadow .12s; }
  .ov-card:hover{ border-color:var(--blue); box-shadow:0 1px 4px rgba(12,102,228,.12); }
  .ov-card b{ display:block; color:var(--blue); font-size:14px; margin-bottom:4px; }
  .ov-card small{ color:var(--N500); font-size:13px; }
  .tag{ display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.4px; color:#fff; padding:1px 6px; border-radius:3px; margin-right:6px; vertical-align:middle; }
  .tag.onsched{ background:var(--blue); } .tag.catchup{ background:var(--catchup); } .tag.dist{ background:var(--dist); }
  main{ flex:1; height:100vh; overflow-y:auto; }
  .breadcrumb{ padding:14px 40px; border-bottom:1px solid var(--line); font-size:12px; color:var(--N500);
    position:sticky; top:0; background:var(--N0); z-index:2; }
  .breadcrumb a{ color:var(--N500); text-decoration:none; }
  .breadcrumb a:hover{ text-decoration:underline; }
  .breadcrumb span.sep{ margin:0 6px; color:var(--N40); }
  .layout{ display:flex; align-items:flex-start; }
  article{ flex:1; min-width:0; padding:32px 40px 80px; } .wrap{ max-width:760px; }
  h2.title{ font-size:29px; line-height:1.2; margin:0 0 4px; font-weight:600; letter-spacing:-.01em; }
  h2.title .type{ font-size:11px; font-weight:600; color:#fff; padding:2px 8px; border-radius:3px;
    vertical-align:middle; margin-left:10px; text-transform:uppercase; letter-spacing:.4px; }
  .type.onsched{ background:var(--blue); } .type.catchup{ background:var(--catchup); } .type.dist{ background:var(--dist); }
  .sub{ color:var(--N500); margin:0 0 28px; font-size:15px; }
  .updated{ color:var(--N300); margin:0 0 28px; font-size:13px; }
  h3{ font-size:20px; font-weight:600; margin:34px 0 10px; padding-top:6px; scroll-margin-top:70px; border-radius:3px; }
  @keyframes flash{ 0%{ background:var(--yellow-bg); } 100%{ background:transparent; } }
  h3.flash{ animation:flash 1.4s ease-out; }
  h3 .n{ color:var(--N300); font-weight:600; }
  code{ background:var(--code-bg); padding:2px 5px; border-radius:3px;
    font:13px ui-monospace,"SFMono-Regular",Consolas,monospace; color:var(--N800); }
  table{ border-collapse:collapse; width:100%; margin:10px 0; font-size:14px; }
  th,td{ text-align:left; padding:8px 12px; border:1px solid var(--N30); vertical-align:top; }
  th{ background:var(--N10); font-weight:600; color:var(--N800); }
  .card th{ color:var(--N700); font-weight:600; width:38%; background:var(--N10); }
  .card td{ background:#fff; }
  ol{ padding-left:22px; } ol li{ margin:6px 0; }
  .panel{ border-radius:4px; padding:12px 16px 12px 14px; margin:14px 0; font-size:14px;
    display:flex; gap:10px; align-items:flex-start; border:1px solid transparent; }
  .panel .ic{ flex:none; font-size:15px; line-height:1.5; }
  .panel.info{ background:var(--blue-bg); border-color:var(--blue-border); } .panel.info .ic{ color:var(--blue); }
  .panel.note{ background:var(--N10); border-color:var(--N30); color:var(--N700); } .panel.note .ic{ color:var(--N500); }
  .formula{ background:var(--blue-bg); border:1px solid var(--blue-border); border-left:3px solid var(--blue);
    padding:14px 18px; border-radius:4px; font-size:16px; } .formula b{ color:var(--blue); }
  .path{ border:1px solid var(--N30); border-radius:4px; padding:2px 14px; margin:10px 0; background:#fff; }
  .path summary{ font-weight:600; cursor:pointer; padding:8px 0; }
  .note{ font-size:13px; color:var(--N500); }
  .ex{ background:var(--N10); border:1px solid var(--N30); border-radius:4px; padding:18px; }
  .ex p{ margin:0 0 10px; } .ex p:last-of-type{ margin-bottom:0; }
  .pill{ display:inline-block; font-size:12px; font-weight:600; padding:2px 8px; border-radius:3px; }
  .pill.t{ background:var(--green-bg); color:var(--green); }
  .pill.f{ background:var(--red-bg); color:var(--red); }
  .verdict{ font-size:16px; margin-top:14px; padding-top:14px; border-top:1px dashed var(--N30); }
  .toc{ width:240px; flex:none; padding:38px 28px 40px 8px; position:sticky; top:49px;
    align-self:flex-start; max-height:calc(100vh - 49px); overflow-y:auto; }
  .toc h4{ font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--N500);
    margin:0 0 10px; font-weight:700; }
  .toc a{ display:block; font-size:13px; color:var(--N500); text-decoration:none;
    padding:4px 0 4px 12px; border-left:2px solid var(--N30); line-height:1.4; }
  .toc a:hover{ color:var(--blue); }
  .toc a.active{ color:var(--blue); border-left-color:var(--blue); font-weight:600; }
  @media(max-width:1100px){ .toc{ display:none; } }
  @media(max-width:640px){
    aside{ width:40vw; min-width:138px; }
    .space{ padding:14px 10px; }
    .space img{ width:118px; }
    .breadcrumb{ padding:12px 16px; }
    article{ padding:24px 16px 64px; }
  }
</style>
</head>

HibHepBIPV</code>, <code>HIB</code>, <code>HibMenC</code>, <code>PCV10</code></td><td>2м 0д – 18р 0д</td><td><code>Hib-інфекція-0</code> — рівно 0 доз<br><code>Hib-інфекція-1</code> — рівно 1 доза<br><code>Hib-інфекція-2</code> — рівно 2 дози<br><code>Hib-інфекція-3</code> — рівно 3 дози<br><code>Hib-інфекція-4</code> — &ge; 4 дози</td><td>немає</td></tr><tr><td><b>Кір</b></td><td><code>Measles</code>, <code>MM</code>, <code>MMR</code>, <code>MMRV</code>, <code>MR</code></td><td>1р 0д – 18р 0д</td><td><code>Кір-0</code> — рівно 0 доз<br><code>Кір-1</code> — рівно 1 доза<br><code>Кір-2</code> — &ge; 2 дози</td><td>дози до 11м 0д не зараховуються</td></tr><tr><td><b>Паротит</b></td><td><code>MM</code>, <code>MMR</code>, <code>MMRV</code>, <code>Mumps</code></td><td>1р 0д – 18р 0д</td><td><code>Паротит-0</code> — рівно 0 доз<br><code>Паротит-1</code> — рівно 1 доза<br><code>Паротит-2</code> — &ge; 2 дози</td><td>дози до 11м 0д не зараховуються</td></tr><tr><td><b>Краснуха</b></td><td><code>MMR</code>, <code>MMRV</code>, <code>MR</code>, <code>Rubella</code></td><td>1р 0д – 18р 0д</td><td><code>Краснуха-0</code> — рівно 0 доз<br><code>Краснуха-1</code> — рівно 1 доза<br><code>Краснуха-2</code> — &ge; 2 дози</td><td>дози до 11м 0д не зараховуються</td></tr><tr><td><b>ВПЛ</b></td><td><code>HPV</code></td><td>9р 0д – 18р 0д</td><td><code>ВПЛ-0</code> — рівно 0 доз<br><code>ВПЛ-1</code> — рівно 1 доза<br><code>ВПЛ-2</code> — рівно 2 дози<br><code>ВПЛ-3</code> — рівно 3 дози</td><td>немає</td></tr></table>",

 }

const TYPE_LABEL = { onsched:"Календарні", catchup:"Поза календарем", dist:"Імунні прошарки" };
const TYPE_ORDER = ["onsched","catchup","dist"];
const TYPE_META = {
  onsched:{ formula:"<b>вакциновані пацієнти</b> / <b>усі пацієнти вікової групи</b> &times; 100", head:"Охоплення&nbsp;%",
            note:"Вакцинованими вважаються лише пацієнти, що виконали правило; решта лишаються у знаменнику." },
  catchup:{ formula:"<b>вакциновані пацієнти</b> / <b>усі пацієнти вікової групи</b> &times; 100", head:"Охоплення&nbsp;%",
            note:"Вакцинованими вважаються лише пацієнти, що виконали правило; решта лишаються у знаменнику." },
  dist:{ formula:"<b>пацієнти у прошарку</b> / <b>усі пацієнти вікової смуги</b> &times; 100", head:"Частка прошарку&nbsp;%",
         note:"Усі прошарки доз (0,1,2,&hellip;) для однієї хвороби та смуги ділять вікову групу — їхні частки дають у сумі 100%." }
};
const ascii = s => s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");

function groupByDisease(){
  const by = {};
  for (const x of INDICATORS) (by[x.disease] ??= []).push(x);
  return by;
}
function codeOf(disease){ const x = INDICATORS.find(i => i.disease === disease); return x ? x.diseaseCode : disease; }

function buildNav(){
  const nav = document.getElementById("nav");
  let html = `<button class="home" data-id="home">&#128196; Огляд</button>`;
  for (const [disease, items] of Object.entries(groupByDisease())){
    html += `<details class="acc type"><summary>${disease}</summary>`;
    const ordered = [...items].sort((a,b)=>TYPE_ORDER.indexOf(a.type)-TYPE_ORDER.indexOf(b.type));
    for (const x of ordered)
      html += `<button data-id="${x.id}" data-search="${(x.name+" "+x.disease+" "+x.summary).toLowerCase()}">`+
              `<span class="dot ${x.type}" title="${TYPE_LABEL[x.type]}"></span>${x.name}</button>`;
    html += `</details>`;
  }
  nav.innerHTML = html;
  nav.querySelectorAll("button").forEach(b => b.addEventListener("click", ()=>select(b.dataset.id)));
}

function row(k,v){ return `<tr><th>${k}</th><td>${v}</td></tr>`; }

function render(x){
  const m = TYPE_META[x.type];
  const cardRows = Object.entries(x.card).map(([k,v])=>row(k,v)).join("");
  const cohort = x.cohort.map(t=>`<li>${t}</li>`).join("");
  const rule = x.rule.map(t=>`<li>${t}</li>`).join("");
  const ruleHead = x.type==="dist" ? "Правило прошарку — у яку групу доз потрапляє пацієнт"
                                    : "Правило вакцинації — хто вважається вакцинованим";
  return `
    <h2 class="title">${x.name}<span class="type ${x.type}">${TYPE_LABEL[x.type]}</span></h2>
    <p class="sub">${x.summary}</p>
    <h3 id="s-card"><span class="n">1.</span> Картка</h3>
    <div class="card"><table>${cardRows}</table></div>
    <h3 id="s-cohort"><span class="n">2.</span> Усі пацієнти вікової групи — знаменник</h3>
    <ol>${cohort}</ol>
    <div class="panel note"><span class="ic">&#9432;</span><div>Належність до вікової групи не залежить від вакцинації — невакцинований пацієнт теж входить у знаменник.</div></div>
    <div class="panel info"><span class="ic">&#9432;</span><div>Пацієнт прив'язаний до закладу, де підписано <b>декларацію</b>, а не де зроблено щеплення.</div></div>
    <h3 id="s-rule"><span class="n">3.</span> ${ruleHead}</h3>
    <ol>${rule}</ol>
    <p class="note">${m.note}</p>
    <h3 id="s-formula"><span class="n">4.</span> Формула</h3>
    <div class="formula">${m.head} = ${m.formula}</div>
    ${x.example ? `<h3 id="s-example"><span class="n">5.</span> Приклад</h3><div class="ex">${x.example}</div>` : ""}`;
}

function renderHome(){
  let groups = "";
  for (const [disease, items] of Object.entries(groupByDisease())){
    const cards = items.map(x =>
      `<div class="ov-card" data-id="${x.id}"><b>${x.name}</b><small><span class="tag ${x.type}">${TYPE_LABEL[x.type]}</span>${x.summary}</small></div>`).join("");
    groups += `<div class="ov-group"><h3 id="ov-${ascii(codeOf(disease))}">${disease}</h3><div class="ov-cards">${cards}</div></div>`;
  }
  return `<h2 class="title">Паспорти індикаторів</h2>
    <p class="updated">Актуально на 18.06.2026</p>
    ${groups}`;
}

function scrollToSection(id){
  const main = document.querySelector("main"); const el = document.getElementById(id);
  if (!el) return;
  const top = el.getBoundingClientRect().top - main.getBoundingClientRect().top + main.scrollTop - 60;
  main.scrollTo({ top: Math.max(0, top), behavior:"smooth" });
  el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
}
function wireToc(list){ list.querySelectorAll("a").forEach(a => a.addEventListener("click", e=>{ e.preventDefault(); scrollToSection(a.dataset.sec); })); }
function buildHomeToc(){
  const list = document.getElementById("tocList");
  list.innerHTML = Object.keys(groupByDisease()).map(d => `<a href="#ov-${ascii(codeOf(d))}" data-sec="ov-${ascii(codeOf(d))}">${d}</a>`).join("");
  wireToc(list);
}
function buildToc(){
  const list = document.getElementById("tocList");
  list.innerHTML = [...document.querySelectorAll("#view h3")].map(h =>
    `<a href="#${h.id}" data-sec="${h.id}">${h.textContent.replace(/^\s*\d+\.\s*/,"")}</a>`).join("");
  wireToc(list);
}
function setCrumb(parts){
  const crumb = document.getElementById("crumb");
  crumb.innerHTML = parts.map((p,idx)=>(idx?`<span class="sep">/</span>`:"")+(p.go?`<a href="#${p.go}" data-go="${p.go}">${p.label}</a>`:`<span>${p.label}</span>`)).join("");
  crumb.querySelectorAll("a[data-go]").forEach(a => a.addEventListener("click", e=>{ e.preventDefault(); select(a.dataset.go); }));
}
function select(id){
  const main = document.querySelector("main");
  if (id==="home" || !INDICATORS.some(x=>x.id===id)){
    document.getElementById("view").innerHTML = renderHome();
    buildHomeToc();
    setCrumb([{label:"Паспорти індикаторів",go:null}]);
    document.querySelectorAll("#view .ov-card").forEach(c => c.addEventListener("click", ()=>select(c.dataset.id)));
    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
    document.querySelector('nav button.home')?.classList.add("active");
    history.replaceState(null,"","#home"); main.scrollTop=0; return;
  }
  const x = INDICATORS.find(i=>i.id===id);
  document.getElementById("view").innerHTML = render(x);
  buildToc();
  setCrumb([{label:"Паспорти індикаторів",go:"home"},
            {label:x.name,go:null}]);
  const btn = document.querySelector(`nav button[data-id="${id}"]`);
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  if (btn){ btn.classList.add("active"); let p=btn.parentElement;
    while(p && p.tagName==="DETAILS"){ p.open=true; p=p.parentElement; } }
  history.replaceState(null,"","#"+id); main.scrollTop=0;
}

function setupScrollSpy(){
  document.querySelector("main").addEventListener("scroll", ()=>{
    const heads=[...document.querySelectorAll("#view h3")]; let cur=heads[0];
    for (const h of heads){ if (h.getBoundingClientRect().top < 120) cur=h; }
    document.querySelectorAll(".toc a").forEach(a => a.classList.toggle("active", cur && a.dataset.sec===cur.id));
  });
}
document.getElementById("q").addEventListener("input", e=>{
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll("nav button[data-search]").forEach(b => b.classList.toggle("hidden", q && !b.dataset.search.includes(q)));
  document.querySelectorAll("nav details.acc").forEach(d=>{
    if (q) d.open=true;
    const any=[...d.querySelectorAll("button")].some(b=>!b.classList.contains("hidden"));
    d.classList.toggle("hidden", q && !any);
  });
});
buildNav(); setupScrollSpy(); select(location.hash.slice(1) || "home");
</script>
</body>
